<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#831843"/>
      <stop offset="45%" stop-color="#db2777"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="innerLight" cx="30%" cy="20%" r="65%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="bowlOuter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#f9a8d4"/>
    </linearGradient>
    <linearGradient id="bowlInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fce7f3"/>
    </linearGradient>
    <linearGradient id="chopL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="rgba(100,0,50,0.4)"/>
    </filter>
    <filter id="textGlow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <clipPath id="bowlClip">
      <path d="M108 198 Q112 295 256 302 Q400 295 404 198 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"/>
  <rect width="512" height="512" rx="110" fill="url(#innerLight)"/>

  <!-- Decorative dot pattern top-right -->
  <circle cx="420" cy="55" r="5" fill="rgba(255,255,255,0.2)"/>
  <circle cx="445" cy="40" r="3" fill="rgba(255,255,255,0.15)"/>
  <circle cx="460" cy="68" r="4" fill="rgba(255,255,255,0.15)"/>
  <circle cx="400" cy="78" r="3" fill="rgba(255,255,255,0.1)"/>

  <!-- ── BOWL ── centered ~y=220 -->
  <g filter="url(#softShadow)">
    <!-- Shadow ellipse -->
    <ellipse cx="256" cy="306" rx="148" ry="18" fill="rgba(100,0,50,0.25)"/>
    <!-- Outer bowl shape -->
    <path d="M108 198 Q112 295 256 302 Q400 295 404 198 Z" fill="url(#bowlOuter)"/>
    <!-- Inner bowl -->
    <path d="M122 198 Q126 285 256 292 Q386 285 390 198 Z" fill="url(#bowlInner)"/>
    <!-- Rim ellipse -->
    <ellipse cx="256" cy="198" rx="134" ry="26" fill="#ffffff"/>
    <!-- Rim highlight -->
    <ellipse cx="222" cy="190" rx="44" ry="9" fill="rgba(255,255,255,0.8)" transform="rotate(-10,222,190)"/>
  </g>

  <!-- Noodle waves clipped inside bowl -->
  <g clip-path="url(#bowlClip)" opacity="0.95">
    <path d="M152 222 Q184 206 216 222 Q248 238 280 222 Q312 206 362 222" stroke="#f9a8d4" stroke-width="9" fill="none" stroke-linecap="round"/>
    <path d="M146 250 Q178 234 210 250 Q242 266 274 250 Q306 234 358 250" stroke="#fbcfe8" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M152 278 Q184 262 216 278 Q248 294 280 278 Q312 262 358 278" stroke="#f9a8d4" stroke-width="7" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ── STEAM ── -->
  <g opacity="0.9">
    <path d="M192 182 C185 160 198 140 190 118 C182 96 195 78 188 58" stroke="rgba(255,255,255,0.75)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M256 175 C249 153 262 133 254 111 C246 89 259 71 252 51" stroke="rgba(255,255,255,0.75)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M320 182 C313 160 326 140 318 118 C310 96 323 78 316 58" stroke="rgba(255,255,255,0.75)" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ── CHOPSTICKS ── -->
  <g>
    <rect x="270" y="58" width="11" height="152" rx="5.5" fill="url(#chopL)" transform="rotate(16,270,58)"/>
    <rect x="300" y="58" width="11" height="152" rx="5.5" fill="url(#chopL)" transform="rotate(24,300,58)"/>
  </g>

  <!-- ── TEXT AREA: bottom 40% of icon ── -->
  <!-- Dark semi-transparent strip for text legibility -->
  <rect x="0" y="330" width="512" height="182" rx="0" fill="rgba(100,10,50,0.32)"/>
  <rect x="0" y="440" width="512" height="72" rx="0" ry="0"
        fill="rgba(80,5,40,0.18)"
        style="border-bottom-left-radius:110px;border-bottom-right-radius:110px"/>
  <!-- Clip bottom corners properly -->
  <rect x="0" y="330" width="512" height="182" fill="rgba(100,10,50,0.28)" clip-path="url(#roundedBottom)"/>

  <!-- "ResepLoka" wordmark -->
  <text
    x="256" y="400"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Georgia, 'Palatino Linotype', serif"
    font-size="72"
    font-weight="700"
    letter-spacing="0"
    fill="#ffffff"
    filter="url(#textGlow)"
  >ResepLoka</text>

  <!-- Thin divider line -->
  <line x1="100" y1="426" x2="412" y2="426" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>

  <!-- Tagline -->
  <text
    x="256" y="454"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="16"
    font-weight="400"
    letter-spacing="4"
    fill="rgba(255,255,255,0.78)"
  >RESEP MASAKAN INDONESIA</text>
</svg>
